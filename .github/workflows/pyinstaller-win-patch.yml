name: Windows Release with Patches

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 使用最新的 Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller rapidocr_onnxruntime onnxruntime

      # 2. 强力修复 pyzbar DLL 丢失问题
      - name: Fix pyzbar dependency
        shell: pwsh
        run: |
          $pyzbarPath = python -c "import pyzbar, os; print(os.path.dirname(pyzbar.__file__))"
          $sitePackages = python -c "import site; print(site.getsitepackages()[0])"
          # 针对 PyInstaller 报错路径进行双重覆盖（Lib 和 lib）
          $targetPaths = @(
            "$sitePackages\pyzbar",
            "$(python -c 'import sys; print(sys.prefix)')\Lib\site-packages\pyzbar"
          )
          foreach ($target in $targetPaths) {
            if (!(Test-Path $target)) { New-Item -ItemType Directory -Force -Path $target }
            Copy-Item "$pyzbarPath\libzbar-64.dll" -Destination "$target\libzbar-64.dll" -Force
            Write-Host "已同步 DLL 到: $target"
          }

      - name: Build EXE
        run: pyinstaller .\webui_zip.spec

      # 3. 生成全量包 (Full Zip)
      - name: Create Full Zip
        run: |
          Compress-Archive -Path ./dist/mower/* -DestinationPath mower-full-${{ github.ref_name }}.zip

      # 4. 生成增量包 (Patch Zip)
      - name: Generate Patches
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS=($(git tag --sort=-v:refname | head -n 3))
          CURRENT=${TAGS[0]}
          
          make_patch() {
            local OLD_TAG=$1
            echo "正在生成从 $OLD_TAG 到 $CURRENT 的增量包..."
            
            gh release download $OLD_TAG -p "mower-full-*.zip" -O old.zip
            unzip -q old.zip -d old_ver
            
            python -c "
            import os, hashlib, zipfile
            from pathlib import Path

            def get_md5(file_path):
                hash_md5 = hashlib.md5()
                with open(file_path, 'rb') as f:
                    for chunk in iter(lambda: f.read(4096), b''):
                        hash_md5.update(chunk)
                return hash_md5.hexdigest()

            def create_patch(old_dir, new_dir, patch_name):
                with zipfile.ZipFile(patch_name, 'w', zipfile.ZIP_DEFLATED) as z:
                    new_path = Path(new_dir)
                    for f in new_path.rglob('*'):
                        if f.is_dir(): continue
                        rel_path = f.relative_to(new_path)
                        old_f = Path(old_dir) / rel_path
                        if not old_f.exists() or get_md5(old_f) != get_md5(f):
                            z.write(f, rel_path)

            create_patch('./old_ver', './dist/mower', 'mower-patch-from-$OLD_TAG.zip')
            "
            rm -rf old_ver old.zip
          }

          if [ ! -z "${TAGS[1]}" ]; then make_patch ${TAGS[1]}; fi
          if [ ! -z "${TAGS[2]}" ]; then make_patch ${TAGS[2]}; fi

      # 5. 发布 Release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mower-full-*.zip
            mower-patch-from-*.zip
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}