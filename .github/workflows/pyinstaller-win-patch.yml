name: Windows Release with Patches

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⭐ pip 缓存
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ⭐ npm 缓存
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Setup Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller rapidocr_onnxruntime onnxruntime pywebview pythonnet
          cd ui && npm install --legacy-peer-deps && npm run build

      # 安装 WebView2 Runtime
      - name: Install WebView2 Runtime
        run: |
          curl -L -o MicrosoftEdgeWebView2Setup.exe https://go.microsoft.com/fwlink/p/?LinkId=2124703
          .\MicrosoftEdgeWebView2Setup.exe /silent /install

      - name: Build EXE
        run: |
          pyinstaller .\webui_zip.spec

      - name: Create Full Zip
        run: |
          7z a -tzip mower-full-${{ github.ref_name }}.zip ./dist/mower/*

      - name: Generate Patches
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e  # 防止 gh/grep/head 失败导致整个 job 退出

          # 生成 make_patch.py
          cat << 'EOF' > make_patch.py
          import sys, os, hashlib, zipfile, shutil
          from pathlib import Path

          def get_md5(p):
              h = hashlib.md5()
              with open(p, 'rb') as f:
                  for chunk in iter(lambda: f.read(4096), b''): h.update(chunk)
              return h.hexdigest()

          old_zip, new_dir, patch_name = sys.argv[1], sys.argv[2], sys.argv[3]
          if os.path.exists('old_ver'): shutil.rmtree('old_ver')
          
          try:
              with zipfile.ZipFile(old_zip, 'r') as z:
                  z.extractall('old_ver')
              with zipfile.ZipFile(patch_name, 'w', zipfile.ZIP_DEFLATED) as z:
                  new_path = Path(new_dir)
                  for f in new_path.rglob('*'):
                      if f.is_dir(): continue
                      rel = f.relative_to(new_path)
                      old_f = Path('old_ver') / rel
                      if not old_f.exists() or get_md5(old_f) != get_md5(f):
                          z.write(f, rel)
          finally:
              if os.path.exists('old_ver'): shutil.rmtree('old_ver')
          EOF

          # 修复 Windows CRLF 导致 grep/head 失效的问题
          git tag --sort=-v:refname | tr -d '\r' > tags.txt

          # 过滤掉当前 tag，取前两个旧 tag
          TAGS=($(grep -v "${{ github.ref_name }}" tags.txt | head -n 2))

          echo "Found tags: ${TAGS[@]}"

          for OLD_TAG in "${TAGS[@]}"; do
            if [ -n "$OLD_TAG" ]; then
              echo "Downloading $OLD_TAG for patch..."

              gh release download "$OLD_TAG" -p "mower-full-*.zip" -O old.zip
              if [ $? -ne 0 ]; then
                echo "Warning: Failed to download $OLD_TAG full zip."
                continue
              fi

              python make_patch.py old.zip ./dist/mower "mower-patch-from-$OLD_TAG.zip"
              rm old.zip
            fi
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: mower-*.zip
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
