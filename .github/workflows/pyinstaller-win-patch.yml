name: Windows Release with Patches

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 设置 Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x64

      # 2. 设置 Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 安装 Python 依赖
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller rapidocr_onnxruntime onnxruntime

      # 4. 构建前端 (使用 --legacy-peer-deps 解决依赖冲突)
      - name: Build Frontend
        run: |
          cd ui
          npm install --legacy-peer-deps
          npm run build
          cd ..

      # 5. 构建 EXE
      - name: Build EXE
        run: pyinstaller .\webui_zip.spec

      # 6. 生成全量包 (Full Zip)
      - name: Create Full Zip
        run: |
          Compress-Archive -Path ./dist/mower/* -DestinationPath mower-full-${{ github.ref_name }}.zip

      # 7. 生成增量包 (Patch Zip)
      - name: Generate Patches
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS=($(git tag --sort=-v:refname | head -n 3))
          CURRENT=${TAGS[0]}
          
          make_patch() {
            local OLD_TAG=$1
            echo "正在生成从 $OLD_TAG 到 $CURRENT 的增量包..."
            
            # 清理旧的残留目录
            rm -rf old_ver old.zip
            
            # 下载旧版本的全量 zip
            gh release download $OLD_TAG -p "mower-full-*.zip" -O old.zip || { echo "未找到旧版本 $OLD_TAG 的全量包，跳过"; return 0; }
            
            # 使用 Python 解压以避免 Windows unzip 的编码和交互问题
            python -c "import zipfile, os; 
            with zipfile.ZipFile('old.zip', 'r') as z: 
                z.extractall('old_ver')"
            
            # 使用 Python 进行二进制级别的 MD5 对比并生成增量包
            python -c "
            import os, hashlib, zipfile
            from pathlib import Path

            def get_md5(file_path):
                hash_md5 = hashlib.md5()
                with open(file_path, 'rb') as f:
                    for chunk in iter(lambda: f.read(4096), b''):
                        hash_md5.update(chunk)
                return hash_md5.hexdigest()

            def create_patch(old_dir, new_dir, patch_name):
                with zipfile.ZipFile(patch_name, 'w', zipfile.ZIP_DEFLATED) as z:
                    new_path = Path(new_dir)
                    for f in new_path.rglob('*'):
                        if f.is_dir(): continue
                        rel_path = f.relative_to(new_path)
                        old_f = Path(old_dir) / rel_path
                        if not old_f.exists() or get_md5(old_f) != get_md5(f):
                            z.write(f, rel_path)

            create_patch('./old_ver', './dist/mower', f'mower-patch-from-$OLD_TAG.zip')
            "
            # 清理现场
            rm -rf old_ver old.zip
          }

          # 为前两个版本生成增量（如果存在）
          if [ ! -z "${TAGS[1]}" ]; then make_patch ${TAGS[1]}; fi
          if [ ! -z "${TAGS[2]}" ]; then make_patch ${TAGS[2]}; fi

      # 8. 发布 Release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mower-full-*.zip
            mower-patch-from-*.zip
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}