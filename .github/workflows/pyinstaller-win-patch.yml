name: Windows Release with Patches

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller rapidocr_onnxruntime onnxruntime
          cd ui && npm install --legacy-peer-deps && npm run build

      - name: Build EXE
        run: pyinstaller .\webui_zip.spec

      - name: Create Full Zip
        run: |
          # 7z 是 Windows 镜像自带的，速度极快
          7z a -tzip mower-full-${{ github.ref_name }}.zip ./dist/mower/*

      - name: Generate Patches
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 编写 Python 对比脚本，解决缩进和编码问题
          cat << 'EOF' > make_patch.py
          import sys, os, hashlib, zipfile, shutil
          from pathlib import Path

          def get_md5(p):
              h = hashlib.md5()
              with open(p, 'rb') as f:
                  for chunk in iter(lambda: f.read(4096), b''): h.update(chunk)
              return h.hexdigest()

          old_zip, new_dir, patch_name = sys.argv[1], sys.argv[2], sys.argv[3]
          if os.path.exists('old_ver'): shutil.rmtree('old_ver')
          
          with zipfile.ZipFile(old_zip, 'r') as z:
              z.extractall('old_ver')

          with zipfile.ZipFile(patch_name, 'w', zipfile.ZIP_DEFLATED) as z:
              new_path = Path(new_dir)
              for f in new_path.rglob('*'):
                  if f.is_dir(): continue
                  rel = f.relative_to(new_path)
                  old_f = Path('old_ver') / rel
                  if not old_f.exists() or get_md5(old_f) != get_md5(f):
                      z.write(f, rel)
          EOF

          TAGS=($(git tag --sort=-v:refname | head -n 3))
          for i in 1 2; do
            OLD_TAG=${TAGS[$i]}
            if [ ! -z "$OLD_TAG" ] && gh release download $OLD_TAG -p "mower-full-*.zip" -O old.zip; then
              echo "Generating patch for $OLD_TAG..."
              python make_patch.py old.zip ./dist/mower "mower-patch-from-$OLD_TAG.zip"
              rm old.zip
            fi
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: mower-*.zip
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}